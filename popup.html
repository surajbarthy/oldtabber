<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OldTabber</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>OldTabber</h1>
    </header>

    <div class="enable-row">
      <span class="enable-label" id="enable-label">Extension on</span>
      <input type="checkbox" id="enabled" aria-labelledby="enable-label" />
    </div>

    <p class="tagline">Choose how quickly tabs start to feel forgotten.</p>

    <div class="mode-block">
      <div class="mode-row">
        <span class="eyebrow">Mode</span>
        <span id="custom-badge" class="custom-badge is-hidden" aria-live="polite">Custom</span>
      </div>
      <div class="mode-pills" role="group" aria-label="Attention decay mode">
        <button type="button" class="mode-pill is-selected" data-preset="balanced">Balanced</button>
        <button type="button" class="mode-pill" data-preset="focus">Focus</button>
        <button type="button" class="mode-pill" data-preset="chill">Chill</button>
      </div>
    </div>

    <div class="mode-block indicator-block">
      <div class="mode-row">
        <span class="eyebrow">Indicator style</span>
      </div>
      <p class="section-hint">Choose how tab status appears in the title.</p>
      <div class="mode-pills" role="group" aria-label="Title indicator style">
        <button type="button" class="mode-pill indicator-pill is-selected" data-indicator="minimal">Minimal</button>
        <button type="button" class="mode-pill indicator-pill" data-indicator="emoji">Emoji</button>
      </div>
    </div>

    <button
      type="button"
      class="disclosure"
      id="customize-toggle"
      aria-expanded="false"
      aria-controls="advanced-panel"
    >
      <span>Customize timing</span>
      <span class="chevron" aria-hidden="true">▾</span>
    </button>

    <div id="advanced-panel" class="advanced is-collapsed" hidden>
      <p class="advanced-hint">
        Each level happens later than the one before it. Values adjust automatically.
      </p>

      <div class="tier-row" data-tier="0">
        <div class="tier-meta">
          <span class="tier-emoji" id="adv-marker-0" aria-hidden="true">·</span>
          <span class="tier-name">Level 1</span>
        </div>
        <div class="tier-fields">
          <input type="number" id="tier-0-num" min="1" step="1" value="30" aria-label="Level 1 value" />
          <select id="tier-0-unit" aria-label="Level 1 unit">
            <option value="minutes" selected>Minutes</option>
            <option value="hours">Hours</option>
            <option value="days">Days</option>
          </select>
        </div>
      </div>
      <div class="tier-row" data-tier="1">
        <div class="tier-meta">
          <span class="tier-emoji" id="adv-marker-1" aria-hidden="true">●</span>
          <span class="tier-name">Level 2</span>
        </div>
        <div class="tier-fields">
          <input type="number" id="tier-1-num" min="1" step="1" value="2" aria-label="Level 2 value" />
          <select id="tier-1-unit" aria-label="Level 2 unit">
            <option value="minutes">Minutes</option>
            <option value="hours" selected>Hours</option>
            <option value="days">Days</option>
          </select>
        </div>
      </div>
      <div class="tier-row" data-tier="2">
        <div class="tier-meta">
          <span class="tier-emoji" id="adv-marker-2" aria-hidden="true">●</span>
          <span class="tier-name">Level 3</span>
        </div>
        <div class="tier-fields">
          <input type="number" id="tier-2-num" min="1" step="1" value="1" aria-label="Level 3 value" />
          <select id="tier-2-unit" aria-label="Level 3 unit">
            <option value="minutes">Minutes</option>
            <option value="hours">Hours</option>
            <option value="days" selected>Days</option>
          </select>
        </div>
      </div>
      <div class="tier-row" data-tier="3">
        <div class="tier-meta">
          <span class="tier-emoji" id="adv-marker-3" aria-hidden="true">✖</span>
          <span class="tier-name">Level 4</span>
        </div>
        <div class="tier-fields">
          <input type="number" id="tier-3-num" min="1" step="1" value="3" aria-label="Level 4 value" />
          <select id="tier-3-unit" aria-label="Level 4 unit">
            <option value="minutes">Minutes</option>
            <option value="hours">Hours</option>
            <option value="days" selected>Days</option>
          </select>
        </div>
      </div>

      <button type="button" class="btn-reset-timing" id="resetModeDefaults">Reset to mode defaults</button>
    </div>

    <hr class="divider" />

    <button type="button" class="btn-reset-tabs" id="resetTabTimers">Reset all tab timers</button>
    <button type="button" class="link-footer" id="openOptions">Extension settings</button>

    <p class="status" id="status" aria-live="polite"></p>

    <script src="utils.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
