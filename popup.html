<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tab Aging</title>
    <style>
      :root {
        color-scheme: light dark;
        --text: #1a1a1e;
        --muted: #5c5c66;
        --border: #d8d8dc;
        --card: #fff;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --text: #f2f2f4;
          --muted: #a0a0ab;
          --border: #3a3a42;
          --card: #252529;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        width: 300px;
        margin: 0;
        padding: 12px 14px 14px;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        font-size: 13px;
        color: var(--text);
        background: var(--card);
      }
      h1 {
        font-size: 15px;
        font-weight: 650;
        margin: 0 0 10px;
        letter-spacing: -0.02em;
      }
      .row {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
        padding: 8px 0;
        border-bottom: 1px solid var(--border);
      }
      .row:last-of-type {
        border-bottom: none;
      }
      label {
        cursor: pointer;
        line-height: 1.35;
      }
      .hint {
        display: block;
        font-size: 11px;
        color: var(--muted);
        margin-top: 2px;
        font-weight: 400;
      }
      input[type='checkbox'] {
        margin-top: 2px;
        flex-shrink: 0;
        accent-color: #c62828;
      }
      .footer {
        margin-top: 12px;
        padding-top: 10px;
        border-top: 1px solid var(--border);
      }
      button.linkish {
        background: none;
        border: none;
        color: #2563eb;
        cursor: pointer;
        font: inherit;
        padding: 0;
        text-decoration: underline;
      }
      @media (prefers-color-scheme: dark) {
        button.linkish {
          color: #93c5fd;
        }
      }
      .status {
        font-size: 11px;
        color: var(--muted);
        margin-top: 8px;
        min-height: 14px;
      }
    </style>
  </head>
  <body>
    <h1>Tab Aging</h1>

    <div class="row">
      <label for="enabled">
        Extension on
        <span class="hint">Master switch.</span>
      </label>
      <input type="checkbox" id="enabled" />
    </div>
    <div class="row">
      <label for="dot">
        Dot on favicon
        <span class="hint">Corner badge on top of the site icon.</span>
      </label>
      <input type="checkbox" id="dot" />
    </div>
    <div class="row">
      <label for="tint">
        Tint on favicon
        <span class="hint">Red wash over the site icon.</span>
      </label>
      <input type="checkbox" id="tint" />
    </div>
    <div class="row">
      <label for="emoji">
        Emoji in title
        <span class="hint">🔸 … ⛔ prefix on the tab title.</span>
      </label>
      <input type="checkbox" id="emoji" />
    </div>

    <div class="footer">
      <button type="button" class="linkish" id="openOptions">All options & thresholds…</button>
      <p class="status" id="status" aria-live="polite"></p>
    </div>

    <script src="utils.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
