<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tab Aging — Options</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f6f6f7;
        --card: #fff;
        --border: #d8d8dc;
        --text: #1a1a1e;
        --muted: #5c5c66;
        --accent: #c62828;
        --accent-soft: rgba(198, 40, 40, 0.12);
        --link: #2563eb;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1b1b1f;
          --card: #252529;
          --border: #3a3a42;
          --text: #f2f2f4;
          --muted: #a0a0ab;
          --accent-soft: rgba(239, 83, 80, 0.18);
          --link: #93c5fd;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        margin: 0;
        padding: 2rem 1.5rem 3rem;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
        max-width: 40rem;
      }
      h1 {
        font-size: 1.35rem;
        font-weight: 600;
        margin: 0 0 0.25rem;
        letter-spacing: -0.02em;
      }
      .sub {
        color: var(--muted);
        font-size: 0.9rem;
        margin-bottom: 1.75rem;
      }
      .sub a {
        color: var(--link);
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 1.25rem 1.35rem;
        margin-bottom: 1rem;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
      }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 0.65rem 0;
        border-bottom: 1px solid var(--border);
      }
      .row:last-child {
        border-bottom: none;
        padding-bottom: 0;
      }
      .row:first-of-type {
        padding-top: 0;
      }
      label {
        font-size: 0.95rem;
        cursor: pointer;
      }
      .hint {
        display: block;
        font-size: 0.8rem;
        color: var(--muted);
        margin-top: 0.2rem;
        font-weight: 400;
      }
      input[type='checkbox'] {
        width: 1.1rem;
        height: 1.1rem;
        accent-color: var(--accent);
      }
      .actions {
        margin-top: 1.25rem;
      }
      button {
        font: inherit;
        padding: 0.55rem 1rem;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--card);
        color: var(--text);
        cursor: pointer;
      }
      button.danger {
        border-color: rgba(198, 40, 40, 0.45);
        color: var(--accent);
        background: var(--accent-soft);
      }
      button:hover {
        filter: brightness(0.97);
      }
      @media (prefers-color-scheme: dark) {
        button:hover {
          filter: brightness(1.08);
        }
      }
      .status {
        font-size: 0.85rem;
        color: var(--muted);
        margin-top: 0.75rem;
        min-height: 1.25rem;
      }
      footer {
        margin-top: 2rem;
        font-size: 0.8rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <h1>Tab Aging</h1>
    <p class="sub">
      Step timing and title emoji live in the
      <strong>toolbar menu</strong> (extension icon). This page is for the master switch, clearing
      per-tab timers, and other housekeeping.
    </p>

    <div class="card">
      <div class="row">
        <label for="enabled">
          Extension enabled
          <span class="hint">Turn off to restore normal tab titles.</span>
        </label>
        <input type="checkbox" id="enabled" />
      </div>
    </div>

    <div class="card actions">
      <button type="button" class="danger" id="resetPages">Reset all tracked tabs</button>
      <p class="hint" style="margin-top: 0.75rem; margin-bottom: 0">
        Clears stored last-focus times per tab. Open tabs refresh after a moment.
      </p>
      <p class="status" id="status" aria-live="polite"></p>
    </div>

    <footer>Manifest V3 · <code>chrome.storage.local</code></footer>
    <script src="utils.js"></script>
    <script src="options.js"></script>
  </body>
</html>
